# ═══════════════════════════════════════════════════════════════
# netlify.toml — Reclaim Solutions
# Brick Advisory Group LLC d/b/a Reclaim Solutions
# Place this file in the same folder as index.html
# ═══════════════════════════════════════════════════════════════

[build]
  publish = "."

# ── SECURITY HEADERS ──────────────────────────────────────────
# Applied to every page on the site
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME sniffing
    X-Content-Type-Options = "nosniff"
    # Force HTTPS for 1 year
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Control referrer info sent to other sites
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions policy — disable features you don't use
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # Content Security Policy — allows Google Fonts and self
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; form-action 'self';"

# ── REDIRECTS ─────────────────────────────────────────────────
# Force www to non-www (or flip if you prefer www)
[[redirects]]
  from = "https://www.reclaimsolutions.com/*"
  to   = "https://reclaimsolutions.com/:splat"
  status = 301
  force  = true

# Force HTTP to HTTPS (Netlify does this automatically too)
[[redirects]]
  from = "http://reclaimsolutions.com/*"
  to   = "https://reclaimsolutions.com/:splat"
  status = 301
  force  = true

# ── FORM SETTINGS ─────────────────────────────────────────────
# Netlify detects the form automatically from index.html
# No additional config needed — just make sure data-netlify="true"
# is on the <form> tag in index.html

# ── NOTES FOR SETUP ───────────────────────────────────────────
# After deploying:
# 1. Site Settings → Domain Management → Add reclaimsolutions.com
# 2. Site Settings → Forms → Add notification email → info@reclaimsolutions.com
# 3. Site Settings → HTTPS → Provision Certificate
# 4. Check Site Settings → Build & Deploy → Environment for any vars needed
